<div class="modal-overlay">
  <div class="dialog-box">
    <button class="close-btn" (click)="cancel.emit()">
      <i class="bi bi-x-lg"></i>
    </button>

    <div class="dialog-icon"><i class="bi bi-exclamation-circle"></i></div>

    <h3>Delete this video?</h3>
    <p>Are you sure you want to delete this video? This action cannot be undone.</p>

    <div class="dialog-actions">
      <button class="btn-cancel" (click)="cancel.emit()">Cancel</button>
      <button class="btn-danger" (click)="confirm.emit()">Delete video</button>
    </div>
  </div>
</div>
